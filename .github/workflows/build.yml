name: Build Kivy iOS App
on:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-14 # macOS runner required for Xcode
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # Install macOS build tools via Homebrew
          brew install autoconf automake libtool pkg-config
          
          # Install required host python tools
          pip install Cython==3.0.11 buildozer
          
          # Fix the missing Xcode project modules explicitly
          pip install pbxproj openstep_parser


      - name: Decode Secrets
        run: |
          echo "$IOS_DISTRIBUTION_CERTIFICATE" | base64 --decode > ios_distribution.cer
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > app.mobileprovision

      - name: Build with Buildozer
        env:
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          buildozer ios debug
